<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arjun AI - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sacred': '#d4af37',
                        'dark-bg': '#0f172a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-100">
    <!-- Login Page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-lg shadow-2xl w-full max-w-md border border-sacred/20">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-sacred mb-2">🪷 Arjun AI</h1>
                <p class="text-gray-400">Admin Dashboard</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" id="username" value="admin" 
                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:border-sacred focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" value="admin123"
                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:border-sacred focus:outline-none">
                </div>
                <button type="submit" 
                    class="w-full bg-sacred hover:bg-sacred/90 text-dark-bg font-bold py-2 px-4 rounded-lg transition">
                    Login
                </button>
                <p id="loginError" class="text-red-400 text-sm hidden"></p>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <!-- Header -->
        <nav class="bg-slate-800 border-b border-sacred/20 px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <h1 class="text-2xl font-bold text-sacred">🪷 Arjun AI Admin</h1>
                    <span id="adminRole" class="px-3 py-1 bg-sacred/20 text-sacred text-sm rounded-full"></span>
                </div>
                <button onclick="logout()" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm">
                    Logout
                </button>
            </div>
        </nav>

        <!-- Tabs -->
        <div class="bg-slate-800 border-b border-slate-700 px-6">
            <div class="flex gap-1">
                <button onclick="showTab('overview')" class="tab-btn px-6 py-3 text-sm font-medium hover:bg-slate-700 rounded-t-lg" data-tab="overview">
                    📊 Overview
                </button>
                <button onclick="showTab('users')" class="tab-btn px-6 py-3 text-sm font-medium hover:bg-slate-700 rounded-t-lg" data-tab="users">
                    👥 Users
                </button>
                <button onclick="showTab('chats')" class="tab-btn px-6 py-3 text-sm font-medium hover:bg-slate-700 rounded-t-lg" data-tab="chats">
                    💬 Chats
                </button>
                <button onclick="showTab('feedback')" class="tab-btn px-6 py-3 text-sm font-medium hover:bg-slate-700 rounded-t-lg" data-tab="feedback">
                    📢 Feedback
                </button>
                <button onclick="showTab('analytics')" class="tab-btn px-6 py-3 text-sm font-medium hover:bg-slate-700 rounded-t-lg" data-tab="analytics">
                    📈 Analytics
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="p-6">
            <!-- Overview Tab -->
            <div id="overviewTab" class="tab-content">
                <h2 class="text-2xl font-bold mb-6">Dashboard Overview</h2>
                <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Stats cards will be inserted here -->
                </div>
            </div>

            <!-- Users Tab -->
            <div id="usersTab" class="tab-content hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">User Management</h2>
                    <input type="text" id="userSearch" placeholder="Search users..." 
                        class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:border-sacred focus:outline-none">
                </div>
                <div id="usersTable" class="bg-slate-800 rounded-lg overflow-hidden">
                    <!-- Users table will be inserted here -->
                </div>
            </div>

            <!-- Chats Tab -->
            <div id="chatsTab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Chat Management</h2>
                <div id="chatsTable" class="space-y-4">
                    <!-- Chats will be inserted here -->
                </div>
            </div>

            <!-- Feedback Tab -->
            <div id="feedbackTab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">User Feedback</h2>
                <div id="feedbackTable" class="space-y-4">
                    <!-- Feedback will be inserted here -->
                </div>
            </div>

            <!-- Analytics Tab -->
            <div id="analyticsTab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Analytics (Last 7 Days)</h2>
                <div id="analyticsChart" class="bg-slate-800 p-6 rounded-lg">
                    <!-- Chart will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-detect backend URL for different environments
        const getBackendUrl = () => {
            const currentUrl = window.location.href;
            const currentHost = window.location.hostname;
            
            console.log('Current URL:', currentUrl);
            
            // VSCode Preview (uses /proxy/{port})
            if (currentUrl.includes('/proxy/8003')) {
                const baseUrl = currentUrl.split('/proxy/8003')[0];
                return baseUrl + '/proxy/8002/api/admin';
            }
            
            // Preview.emergentagent.com
            if (currentHost.includes('preview.emergentagent.com')) {
                return window.location.origin.replace(':8003', ':8002') + '/api/admin';
            }
            
            // Localhost
            return 'http://localhost:8002/api/admin';
        };
        
        const API_URL = getBackendUrl();
        console.log('🔌 Connecting to API:', API_URL);
        
        let token = localStorage.getItem('admin_token');
        let currentTab = 'overview';

        // Check if already logged in
        if (token) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadDashboard();
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) throw new Error('Invalid credentials');

                const data = await response.json();
                token = data.access_token;
                localStorage.setItem('admin_token', token);
                localStorage.setItem('admin_user', JSON.stringify(data.admin));

                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadDashboard();
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.remove('hidden');
            }
        });

        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            location.reload();
        }

        async function apiCall(endpoint) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error('API call failed');
            return response.json();
        }

        async function loadDashboard() {
            const admin = JSON.parse(localStorage.getItem('admin_user'));
            document.getElementById('adminRole').textContent = admin.role;
            showTab('overview');
        }

        async function showTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.tab === tab) {
                    btn.classList.add('bg-slate-700', 'text-sacred');
                } else {
                    btn.classList.remove('bg-slate-700', 'text-sacred');
                }
            });

            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`${tab}Tab`).classList.remove('hidden');

            // Load data
            if (tab === 'overview') await loadOverview();
            if (tab === 'users') await loadUsers();
            if (tab === 'chats') await loadChats();
            if (tab === 'feedback') await loadFeedback();
            if (tab === 'analytics') await loadAnalytics();
        }

        async function loadOverview() {
            const data = await apiCall('/overview');
            const stats = [
                { label: 'Total Users', value: data.total_users, icon: '👥', color: 'bg-blue-600' },
                { label: 'Active Users', value: data.active_users, icon: '✅', color: 'bg-green-600' },
                { label: 'Total Chats', value: data.total_chats, icon: '💬', color: 'bg-purple-600' },
                { label: 'Feedback', value: data.total_feedback, icon: '📢', color: 'bg-yellow-600' },
                { label: 'Today\'s Users', value: data.today_users, icon: '🆕', color: 'bg-pink-600' },
                { label: 'Today\'s Chats', value: data.today_chats, icon: '📊', color: 'bg-indigo-600' },
            ];

            document.getElementById('statsGrid').innerHTML = stats.map(stat => `
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700 hover:border-sacred/50 transition">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-4xl">${stat.icon}</span>
                        <span class="${stat.color} px-3 py-1 rounded-full text-xs font-bold">${stat.value}</span>
                    </div>
                    <h3 class="text-gray-400 text-sm">${stat.label}</h3>
                    <p class="text-3xl font-bold text-white mt-2">${stat.value}</p>
                </div>
            `).join('');
        }

        async function loadUsers() {
            const data = await apiCall('/users?limit=50');
            document.getElementById('usersTable').innerHTML = `
                <table class="w-full">
                    <thead class="bg-slate-700">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Name</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Chats</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Streak</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Joined</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-700">
                        ${data.users.map(user => `
                            <tr class="hover:bg-slate-700/50">
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-white">${user.name}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">${user.email}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">${user.total_chats}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">🔥 ${user.current_streak}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">${new Date(user.created_at).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function loadChats() {
            const data = await apiCall('/chats?limit=30');
            document.getElementById('chatsTable').innerHTML = data.chats.map(chat => `
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-bold text-sacred">${chat.user_name}</p>
                            <p class="text-sm text-gray-400">${chat.user_email}</p>
                        </div>
                        <span class="text-xs text-gray-500">${new Date(chat.timestamp).toLocaleString()}</span>
                    </div>
                    <div class="space-y-3">
                        <div class="bg-slate-700 p-3 rounded-lg">
                            <p class="text-xs text-gray-400 mb-1">User:</p>
                            <p class="text-sm">${chat.message}</p>
                        </div>
                        <div class="bg-sacred/10 p-3 rounded-lg border border-sacred/20">
                            <p class="text-xs text-sacred mb-1">Arjun:</p>
                            <p class="text-sm">${chat.response}</p>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-3">Mode: ${chat.mode}</p>
                </div>
            `).join('');
        }

        async function loadFeedback() {
            const data = await apiCall('/feedback?limit=30');
            if (data.feedback.length === 0) {
                document.getElementById('feedbackTable').innerHTML = '<p class="text-gray-400 text-center py-8">No feedback yet</p>';
                return;
            }
            document.getElementById('feedbackTable').innerHTML = data.feedback.map(fb => `
                <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-bold">${fb.user_name}</p>
                            <p class="text-sm text-gray-400">${fb.user_email}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs ${fb.type === 'issue' ? 'bg-red-600' : 'bg-green-600'}">${fb.type}</span>
                    </div>
                    <p class="text-sm mb-3">${fb.message}</p>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>Contact: ${fb.contact_preference}</span>
                        <span>${new Date(fb.timestamp).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadAnalytics() {
            const data = await apiCall('/analytics');
            const maxChats = Math.max(...data.stats.map(s => s.chats));
            
            document.getElementById('analyticsChart').innerHTML = `
                <div class="space-y-4">
                    ${data.stats.map(stat => `
                        <div>
                            <div class="flex justify-between text-sm mb-2">
                                <span class="text-gray-400">${stat.date}</span>
                                <span class="text-white">Users: ${stat.users} | Chats: ${stat.chats}</span>
                            </div>
                            <div class="bg-slate-700 h-8 rounded-full overflow-hidden">
                                <div class="bg-sacred h-full" style="width: ${(stat.chats / maxChats) * 100}%"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // User search
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('userSearch');
            if (searchInput) {
                searchInput.addEventListener('input', async (e) => {
                    const search = e.target.value;
                    const data = await apiCall(`/users?search=${search}&limit=50`);
                    // Reload users table with search results
                    await loadUsers();
                });
            }
        });
    </script>
</body>
</html>
